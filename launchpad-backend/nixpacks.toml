[variables]
NIXPACKS_NODE_VERSION = "22"
# Skip Puppeteer's Chromium download during npm install — we use the
# nix-installed chromium below. Its absolute path lives under /nix/store/...,
# so we DO NOT hardcode PUPPETEER_EXECUTABLE_PATH; services/pitchPdf.js
# resolves it at runtime via `which chromium` (Nix puts it on $PATH).
PUPPETEER_SKIP_DOWNLOAD = "true"

[phases.setup]
# "..." keeps Nixpacks' auto-detected Node.js; without it only ffmpeg/chromium
# install and npm is missing. chromium is required for headless PDF rendering
# (services/pitchPdf.js).
nixPkgs = ["...", "ffmpeg", "chromium"]
